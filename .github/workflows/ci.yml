name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint / Format / Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build
        run: pnpm build

      - name: Run check (fmt + lint)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run tests
        run: pnpm test

  change-intent:
    name: Change intent
    # Dependency bumps (Renovate) and the release PR carry no change intent by design;
    # skipping the job is treated as success by branch protection.
    if: github.actor != 'renovate[bot]' && github.head_ref != 'pnpm-release/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify a change intent is present
        run: |
          git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD \
            | grep -E '^\.changeset/[^/]+\.md$' \
            | grep -v '^\.changeset/README\.md$'
