blockExoticSubdeps: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@k8o/*'
  # Renovate security update: vite-plus@0.1.24
  - vite-plus@0.1.24

strictDepBuilds: true

allowBuilds:
  esbuild: false

verifyDepsBeforeRun: install

saveExact: true
autoInstallPeers: false

versioning:
  changelog:
    storage: repository
